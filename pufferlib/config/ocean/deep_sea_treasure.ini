[base]
package = ocean
env_name = puffer_deep_sea_treasure
policy_name = DeepSeaTreasure
rnn_name = Recurrent

[policy]
q_value_critic = False
weight_conditioning = False

[eval]
action_selection = policy
num_policies = 1

[env]
num_envs = 8
gamma = 0.99
report_interval = 128
max_ticks = 0
max_ticks_offset_mod = 1

[vec]
num_envs = 8

[train]
total_timesteps = 3_000_000
learning_rate = 0.001
batch_size = 4096
minibatch_size = 2048
bptt_horizon = 16
update_epochs = 4
ent_coef = 0.01
gae_lambda = 0.95
gamma = 0.99
clip_coef = 0.2
vf_coef = 0.5
vf_clip_coef = 0.2
max_grad_norm = 0.5
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 1e-8