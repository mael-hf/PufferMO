[env]
max_ticks = 500
max_ticks_offset_mod = 50

[train]
# Hyperparamètres PPO Standards
total_timesteps = 10000000
learning_rate = 2.5e-4
num_envs = 64
num_cores = 4
num_minibatches = 4
update_epochs = 4

# Paramètres de régularisation et d'exploration
gamma = 0.99
gae_lambda = 0.95
clip_coef = 0.1
ent_coef = 0.01
vf_coef = 0.5
max_grad_norm = 0.5